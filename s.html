<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贴词吧 · 方案分享</title>
    <meta property="og:title" content="贴词吧 · 方案分享">
    <meta property="og:description" content="AI 时代的提示词剪贴板">
    <meta property="og:image" content="/logo.png">
    <script src="supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 40px 36px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .brand { font-size: 14px; color: #007aff; font-weight: 600; margin-bottom: 24px; }
        .scheme-title { font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; word-break: break-word; }
        .scheme-meta { font-size: 14px; color: #888; margin-bottom: 20px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .scheme-desc { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 24px; padding: 16px; background: #f9f9f9; border-radius: 8px; word-break: break-word; text-align: left; }
        .card-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; justify-content: center; }
        .card-chip { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; color: white; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #0051d5; }
        .btn:disabled { background: #999; cursor: wait; }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-secondary:hover { background: #e0e0e0; }
        .error { color: #ff3b30; font-size: 14px; margin-top: 16px; min-height: 20px; }
        .success { color: #34c759; }
        .info-tip { font-size: 12px; color: #aaa; margin-top: 16px; line-height: 1.5; }
        .loader { display: inline-block; width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #007aff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { margin-top: 24px; font-size: 12px; color: #aaa; }
        .footer a { color: #007aff; }
        .public-badge { display: inline-block; padding: 2px 8px; background: #34c75920; color: #34c759; border-radius: 4px; font-size: 12px; font-weight: 600; margin-left: 6px; }
        .image-preview { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; justify-content: center; }
        .image-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="card" id="card">
    <div class="brand">🧋 贴词吧</div>
    <div id="content">
        <div class="loader"></div>
    </div>
    <div class="error" id="error"></div>
    <div class="footer">
        <a href="/">打开贴词吧</a>
        &nbsp;·&nbsp;
        <a href="/explore.html">探索更多方案</a>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://plnwkcdpzybbthuxfnmf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsbndrY2RwenliYnRodXhmbm1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzU5MDYsImV4cCI6MjA5MzgxMTkwNn0.yr9849QufCAkJ6zs-OCrQEjwDEs55rwQNpNi0d43cvc';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const content = document.getElementById('content');
const errorBox = document.getElementById('error');

async function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
        content.innerHTML = '<p style="color:#888;margin:40px 0;">未提供方案 ID</p>';
        return;
    }

    // 先查私有分享
    let { data, error } = await supa
        .from('shared_schemes')
        .select('*')
        .eq('short_id', id)
        .maybeSingle();

    let isPublic = false;
    if (!data) {
        // 再查公开分享
        const { data: pubData } = await supa
            .from('public_schemes')
            .select('*')
            .eq('id', parseInt(id))
            .maybeSingle();
        if (pubData) {
            data = pubData;
            isPublic = true;
        }
    }

    if (error || !data) {
        content.innerHTML = '<p style="color:#888;margin:40px 0;">方案不存在或已被删除</p>';
        return;
    }

    // 浏览计数
    if (isPublic) {
        supa.from('public_schemes').update({ view_count: (data.view_count || 0) + 1 }).eq('id', data.id).then(()=>{});
    } else {
        supa.from('shared_schemes').update({ views: (data.views || 0) + 1 }).eq('short_id', id).then(()=>{});
    }

    // 更新 OG
    document.title = `贴词吧 · ${data.title}`;
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDesc = document.querySelector('meta[property="og:description"]');
    if (ogTitle) ogTitle.setAttribute('content', `贴词吧 · ${data.title}`);
    if (ogDesc) ogDesc.setAttribute('content', `${data.card_count || 0} 张卡片 · AI 提示词方案`);

    // 卡片预览（最多12个）
    const scheme = data.scheme_data;
    const chipPreview = Array.isArray(scheme?.inputs)
        ? scheme.inputs.slice(0, 12).map(c => {
            const label = c.title || c.content?.slice(0, 8) || '...';
            return `<span class="card-chip" style="background:${c.color||'#888'}">${escapeHtml(label)}</span>`;
          }).join('')
        : '';

    // 图片预览（公开分享才有 images 字段）
    const imgPreview = (isPublic && Array.isArray(data.images) && data.images.length > 0)
        ? `<div class="image-preview">${data.images.slice(0,5).map(url => `<img src="${escapeHtml(url)}" alt="配图" onclick="window.open('${escapeHtml(url)}')">`).join('')}</div>`
        : '';

    const cardCount = data.card_count || 0;
    const sourceLabel = isPublic ? '🌍 公开分享' : '🔒 私有分享';
    const extraCount = (scheme?.inputs?.length > 12) ? ` 等 ${scheme.inputs.length} 张` : '';

    content.innerHTML = `
        <h1 class="scheme-title">${escapeHtml(data.title)} <span class="public-badge">${sourceLabel}</span></h1>
        <div class="scheme-meta">
            <span>📋 ${cardCount} 张卡片</span>
            <span>👤 ${escapeHtml(data.owner_email || '匿名用户')}</span>
        </div>
        ${data.description ? `<div class="scheme-desc">${escapeHtml(data.description)}</div>` : ''}
        ${imgPreview}
        ${chipPreview ? `<div class="card-chips">${chipPreview}${extraCount}</div>` : '<p style="color:#888;margin:20px 0;">（空方案）</p>'}
        <button class="btn" id="importBtn" onclick="doImport()">📥 导入到我的贴词吧</button>
        <button class="btn-secondary" onclick="copyLink()">🔗 复制分享链接</button>
        <div class="info-tip">导入后可在贴词吧中编辑和使用这些提示词卡片。</div>
    `;
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
        errorBox.className = 'error success';
        errorBox.textContent = '链接已复制！';
    });
}

async function doImport() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const btn = document.getElementById('importBtn');
    btn.disabled = true;
    btn.textContent = '准备导入…';

    // 获取完整数据
    let data = null;
    const { data: privData } = await supa
        .from('shared_schemes')
        .select('*')
        .eq('short_id', id)
        .maybeSingle();

    if (privData) {
        data = privData;
    } else {
        const { data: pubData } = await supa
            .from('public_schemes')
            .select('*')
            .eq('id', parseInt(id))
            .maybeSingle();
        data = pubData;
    }

    if (!data) {
        errorBox.textContent = '方案不存在';
        btn.disabled = false;
        btn.textContent = '📥 导入到我的贴词吧';
        return;
    }

    // 导入计数
    supa.from('shared_schemes').update({ imports: (data.imports || 0) + 1 }).eq('short_id', id).then(()=>{});

    // 存到 localStorage，跳转到主页处理（会弹出确认弹窗）
    localStorage.setItem('pendingImport', JSON.stringify({
        source: data.short_id || data.id?.toString(),
        title: data.title,
        cardCount: data.card_count || 0,
        schemeData: data.scheme_data,
        importedAt: Date.now()
    }));

    btn.textContent = '跳转中…';
    window.location.href = '/';
}

init();
</script>
</body>
</html>
